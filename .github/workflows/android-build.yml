name: Android Build APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Gradle 8.6 download aur wrapper files manually generate karo
    - name: Setup Gradle Wrapper Files (Auto-Generated)
      run: |
        cd ExcelTableApp
        
        # Create gradle wrapper directory
        mkdir -p gradle/wrapper
        
        # Download gradle-wrapper.jar directly from Gradle releases
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
        
        # Create gradle-wrapper.properties
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
        networkTimeout=10000
        validateDistributionUrl=true
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # Create gradlew script for Linux/Mac
        cat > gradlew << 'GRADLEW'
        #!/bin/sh
        # Gradle wrapper script
        
        # Determine the Java command to use
        if [ -n "$JAVA_HOME" ] ; then
            JAVACMD="$JAVA_HOME/bin/java"
        else
            JAVACMD="java"
        fi
        
        # Get the location of this script
        APP_HOME=$(cd "$(dirname "$0")" && pwd)
        
        # Build the classpath
        CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
        
        # Run Gradle
        exec "$JAVACMD" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
        GRADLEW
        
        # Create gradlew.bat for Windows
        cat > gradlew.bat << 'GRADLEWBAT'
        @rem Gradle startup script for Windows
        @if "%DEBUG%"=="" @echo off
        setlocal
        set DIRNAME=%~dp0
        set APP_HOME=%DIRNAME%
        set CLASSPATH=%APP_HOME%\gradle\wrapper\gradle-wrapper.jar
        set JAVA_EXE=java.exe
        if defined JAVA_HOME set JAVA_EXE=%JAVA_HOME%\bin\java.exe
        "%JAVA_EXE%" -classpath "%CLASSPATH%" org.gradle.wrapper.GradleWrapperMain %*
        endlocal
        GRADLEWBAT
        
        # Make gradlew executable
        chmod +x gradlew
        
        echo "Gradle wrapper files created:"
        ls -la gradlew gradlew.bat gradle/wrapper/

    # Launcher icons generate karo agar missing hain
    - name: Generate Launcher Icons (If Missing)
      run: |
        BASE_DIR="ExcelTableApp/app/src/main/res"
        
        if [ ! -f "$BASE_DIR/mipmap-hdpi/ic_launcher.png" ]; then
          echo "Icons missing, generating..."
          sudo apt-get install -y imagemagick
          
          for size in 48:mdpi 72:hdpi 96:xhdpi 144:xxhdpi 192:xxxhdpi; do
            IFS=":" read -r res name <<< "$size"
            mkdir -p "$BASE_DIR/mipmap-$name"
            convert -size ${res}x${res} xc:#2196F3 -fill white -gravity center -pointsize $((res/3)) -annotate 0 "FD" "$BASE_DIR/mipmap-$name/ic_launcher.png"
            convert -size ${res}x${res} xc:#2196F3 -fill white -gravity center -pointsize $((res/3)) -annotate 0 "FD" "$BASE_DIR/mipmap-$name/ic_launcher_round.png"
          done
          echo "Icons generated!"
        else
          echo "Icons exist, skipping."
        fi

    # Build the APK
    - name: Build Debug APK
      working-directory: ExcelTableApp
      run: |
        ./gradlew assembleDebug --stacktrace --no-daemon

    # Upload the APK
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: FieldDataCollector-debug
        path: ExcelTableApp/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 30
