name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create settings.gradle
        run: |
          cat > ExcelTableApp/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "FieldDataCollector"
          include ':app'
          EOF

      - name: Create root build.gradle
        run: |
          cat > ExcelTableApp/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

      - name: Create app/build.gradle
        run: |
          cat > ExcelTableApp/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.example.fielddatacollector'
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.fielddatacollector"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              packaging {
                  resources {
                      excludes += ['META-INF/DEPENDENCIES', 'META-INF/LICENSE',
                                   'META-INF/LICENSE.txt', 'META-INF/NOTICE',
                                   'META-INF/NOTICE.txt', 'META-INF/*.RSA',
                                   'META-INF/*.SF', 'META-INF/*.DSA']
                  }
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'androidx.core:core:1.12.0'
              implementation('org.apache.poi:poi-ooxml:5.2.3') {
                  exclude group: 'org.apache.xmlbeans', module: 'xmlbeans'
              }
              implementation 'org.apache.xmlbeans:xmlbeans:5.1.1'
              implementation 'com.google.mlkit:text-recognition:16.0.0'
              implementation 'com.google.code.gson:gson:2.10.1'
          }
          EOF

      - name: Create gradle wrapper files
        run: |
          mkdir -p ExcelTableApp/gradle/wrapper
          cat > ExcelTableApp/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download gradle-wrapper.jar
        run: |
          curl -L -o ExcelTableApp/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Create gradlew script
        run: |
          cat > ExcelTableApp/gradlew << 'GRADLEW'
          #!/bin/sh
          APP_HOME="$(cd "$(dirname "$0")" && pwd)"
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          exec "$JAVA_HOME/bin/java" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x ExcelTableApp/gradlew

      - name: Create launcher icons (placeholder)
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p ExcelTableApp/app/src/main/res/mipmap-mdpi
          mkdir -p ExcelTableApp/app/src/main/res/mipmap-hdpi
          mkdir -p ExcelTableApp/app/src/main/res/mipmap-xhdpi
          mkdir -p ExcelTableApp/app/src/main/res/mipmap-xxhdpi
          mkdir -p ExcelTableApp/app/src/main/res/mipmap-xxxhdpi
          convert -size 48x48 xc:#2196F3 ExcelTableApp/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 48x48 xc:#2196F3 ExcelTableApp/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert -size 72x72 xc:#2196F3 ExcelTableApp/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 72x72 xc:#2196F3 ExcelTableApp/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert -size 96x96 xc:#2196F3 ExcelTableApp/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 96x96 xc:#2196F3 ExcelTableApp/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert -size 144x144 xc:#2196F3 ExcelTableApp/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 144x144 xc:#2196F3 ExcelTableApp/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert -size 192x192 xc:#2196F3 ExcelTableApp/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert -size 192x192 xc:#2196F3 ExcelTableApp/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Fix missing strings in strings.xml
        run: |
          STRINGS_FILE="ExcelTableApp/app/src/main/res/values/strings.xml"
          # app_tagline missing hai - add karo closing tag se pehle
          sed -i 's|</resources>|    <string name="app_tagline">WhatsApp Data Extraction Tool</string>\n    <string name="btn_toggle_bubble">Toggle Bubble</string>\n    <string name="permission_overlay_card">Overlay Permission</string>\n    <string name="permission_accessibility_card">Accessibility Permission</string>\n</resources>|' "$STRINGS_FILE"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        working-directory: ExcelTableApp

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ExcelTableApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        working-directory: ExcelTableApp

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: ExcelTableApp/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-unsigned

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-debug.apk
            app-release-unsigned.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
