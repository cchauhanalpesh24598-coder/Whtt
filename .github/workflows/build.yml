name: Build APK

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # This automatically downloads Gradle wrapper - no need for gradle-wrapper.jar in repo
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-read-only: false
      
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon
        working-directory: .
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Build Release APK (unsigned)
        run: gradle assembleRelease --stacktrace --no-daemon
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  # Create release when pushing a tag like v1.0.0
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-unsigned
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-debug.apk
            app-release-unsigned.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
