name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create root build.gradle
        run: |
          cat > ExcelTableApp/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Create settings.gradle
        run: |
          cat > ExcelTableApp/settings.gradle << 'EOF'
          rootProject.name = "FieldDataCollector"
          include ':app'
          EOF

      - name: Update app/build.gradle
        run: |
          cat > ExcelTableApp/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.example.fielddatacollector'
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.fielddatacollector"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              packagingOptions {
                  resources {
                      excludes += ['META-INF/DEPENDENCIES', 'META-INF/LICENSE',
                                   'META-INF/LICENSE.txt', 'META-INF/NOTICE',
                                   'META-INF/NOTICE.txt', 'META-INF/*.RSA',
                                   'META-INF/*.SF', 'META-INF/*.DSA']
                  }
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'androidx.core:core:1.12.0'
              implementation('org.apache.poi:poi-ooxml:5.2.3') {
                  exclude group: 'org.apache.xmlbeans', module: 'xmlbeans'
              }
              implementation 'org.apache.xmlbeans:xmlbeans:5.1.1'
              implementation 'com.google.mlkit:text-recognition:16.0.0'
              implementation 'com.google.code.gson:gson:2.10.1'
          }
          EOF

      - name: Generate Gradle Wrapper
        run: |
          cd ExcelTableApp
          gradle wrapper --gradle-version 8.6

      - name: Create launcher icons
        run: |
          sudo apt-get install -y imagemagick
          BASE_DIR="ExcelTableApp/app/src/main/res"
          for size in 48:mdpi 72:hdpi 96:xhdpi 144:xxhdpi 192:xxxhdpi; do
            IFS=":" read -r res name <<< "$size"
            mkdir -p "$BASE_DIR/mipmap-$name"
            convert -size ${res}x${res} xc:#2196F3 "$BASE_DIR/mipmap-$name/ic_launcher.png"
            convert -size ${res}x${res} xc:#2196F3 "$BASE_DIR/mipmap-$name/ic_launcher_round.png"
          done

      - name: Fix strings.xml
        run: |
          STRINGS_FILE="ExcelTableApp/app/src/main/res/values/strings.xml"
          # Purani file rewrite karke sare tags ensure karein
          cat > "$STRINGS_FILE" << 'EOF'
          <resources>
              <string name="app_name">FieldDataCollector</string>
              <string name="app_tagline">WhatsApp Data Extraction Tool</string>
              <string name="btn_toggle_bubble">Toggle Bubble</string>
              <string name="permission_overlay_card">Overlay Permission</string>
              <string name="permission_accessibility_card">Accessibility Permission</string>
          </resources>
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.6

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        working-directory: ExcelTableApp

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ExcelTableApp/app/build/outputs/apk/debug/*.apk

      - name: Build Release APK (unsigned)
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
        working-directory: ExcelTableApp

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: ExcelTableApp/app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-debug/*.apk
            app-release-unsigned/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
